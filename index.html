<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Первые шаги — Урок 12 단어장</title>
<style>
:root{
  --deep:#5B1423;
  --ink:#241A1E;
  --paper:#F7F4F2;
  --card:#FFFFFF;
  --red:#C8102E;
  --green:#2E7D5B;
  --gold:#E8B84B;
  --muted:#7A6E72;
  --line:#E5DDDA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif;
  background:var(--paper);color:var(--ink);
  display:flex;flex-direction:column;height:100dvh;overflow:hidden;
}
.serif{font-family:Georgia,"Times New Roman",serif}

/* ── header ── */
header{background:var(--deep);color:#fff;padding:14px 16px 10px;flex-shrink:0}
.brand{display:flex;justify-content:space-between;align-items:baseline}
.brand h1{font-size:16px;font-weight:700;letter-spacing:-.2px}
.brand h1 em{font-family:Georgia,serif;font-style:italic;font-weight:400;opacity:.85}
.progress-label{font-size:12px;opacity:.8}
.pbar{height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin-top:10px;overflow:hidden}
.pbar>div{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width .3s}

/* ── mode tabs ── */
nav{display:flex;background:var(--deep);flex-shrink:0}
nav button{
  flex:1;background:none;border:none;color:rgba(255,255,255,.55);
  font-size:14px;font-weight:600;padding:10px 0 12px;cursor:pointer;
  border-bottom:3px solid transparent;font-family:inherit;
}
nav button.on{color:#fff;border-bottom-color:var(--gold)}

/* ── filter bar ── */
.filters{
  display:flex;gap:8px;padding:10px 16px;overflow-x:auto;flex-shrink:0;
  background:var(--paper);border-bottom:1px solid var(--line);scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
}
.chip.on{background:var(--deep);border-color:var(--deep);color:#fff}
select.chip{appearance:none;padding-right:26px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%237A6E72' stroke-width='1.5' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 10px center}

/* ── study area ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#studyView{flex:1;display:flex;flex-direction:column;padding:14px 16px calc(14px + env(safe-area-inset-bottom));overflow:hidden}
.counter{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:10px}
.counter b{color:var(--ink)}

/* card */
.cardwrap{flex:1;perspective:1200px;min-height:0}
.card{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,.1,.2,1);cursor:pointer;
}
.card.flip{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 6px 24px rgba(91,20,35,.09);
  display:flex;flex-direction:column;overflow:hidden;
}
.face.back{transform:rotateY(180deg)}
.tab{
  position:absolute;top:22px;right:0;
  background:var(--red);color:#fff;font-size:11.5px;font-weight:700;letter-spacing:.5px;
  padding:5px 10px 5px 12px;border-radius:6px 0 0 6px;
}
.tab.other{background:var(--green)}
.face .inner{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;overflow-y:auto;min-height:0}
.front .word{font-size:clamp(28px,8.5vw,42px);font-weight:700;color:var(--deep);letter-spacing:-.3px;line-height:1.2;word-break:break-word}
.front .pos{font-family:Georgia,serif;font-style:italic;color:var(--muted);font-size:16px;margin-top:8px}
.front .notekey{font-family:Georgia,serif;font-style:italic;font-size:15px;color:var(--red);margin-top:6px}
.hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;color:var(--muted)}

.back .word{font-size:20px;font-weight:700;color:var(--deep);line-height:1.35}
.back .word .pos{font-family:Georgia,serif;font-style:italic;font-weight:400;color:var(--muted);font-size:14px;margin-left:6px}
.back .gov{font-family:Georgia,serif;font-style:italic;font-size:14px;color:var(--red);margin-top:2px}
.back .ko{font-size:19px;font-weight:700;margin:12px 0 14px;line-height:1.4}
.exbox{border-top:1px solid var(--line);padding-top:12px}
.exlabel{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--red);margin-bottom:6px}
.ex{font-family:Georgia,serif;font-size:16px;line-height:1.55;color:var(--ink)}
.ex mark{background:none;color:var(--red);font-weight:700;border-bottom:2px solid var(--red)}
.ek{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5}
.vnote{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.5}
.vnote b{color:var(--deep)}

/* 변화표 (collapsible) */
details.tbl{margin-top:12px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
details.tbl summary{
  list-style:none;cursor:pointer;padding:9px 12px;font-size:12.5px;font-weight:700;
  color:var(--deep);background:#FBF6F0;display:flex;align-items:center;gap:6px;
}
details.tbl summary::-webkit-details-marker{display:none}
details.tbl summary::before{content:'▸';font-size:11px;transition:transform .15s}
details.tbl[open] summary::before{transform:rotate(90deg)}
.tblbody{padding:10px 12px 12px}
.tblsec{margin-bottom:10px}
.tblsec:last-child{margin-bottom:0}
.tblsec .tt{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
table.forms{width:100%;border-collapse:collapse}
table.forms td{padding:3px 6px;font-size:14px;vertical-align:top}
table.forms td.lb{font-family:Georgia,serif;font-style:italic;color:var(--muted);font-size:12.5px;width:52px;white-space:nowrap}
table.forms td.fm{font-family:Georgia,serif;color:var(--ink)}
table.forms tr:nth-child(even){background:#FAF7F5}

/* action buttons */
.actions{display:flex;gap:10px;margin-top:14px;flex-shrink:0}
.actions button{
  flex:1;border:none;border-radius:12px;padding:15px 0;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;color:#fff;
}
.btn-no{background:var(--red)}
.btn-yes{background:var(--green)}
.btn-prev{flex:0 0 52px;background:var(--card);color:var(--muted);border:1px solid var(--line);font-size:18px}
.actions button:active{transform:scale(.97)}
.done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:20px}
.done .big{font-size:40px}
.done p{color:var(--muted);font-size:14px;line-height:1.6}
.done button{border:none;background:var(--deep);color:#fff;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── list view ── */
#listView{flex:1;display:none;flex-direction:column;overflow:hidden}
.searchbar{padding:10px 16px;flex-shrink:0}
.searchbar input{
  width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 14px;
  font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);
}
.searchbar input:focus{outline:2px solid var(--deep)}
#list{flex:1;overflow-y:auto;padding:0 16px calc(20px + env(safe-area-inset-bottom))}
.row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer}
.row .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.row .w{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--deep)}
.row .p{font-family:Georgia,serif;font-style:italic;font-size:12.5px;color:var(--muted)}
.row .lv{margin-left:auto;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;color:#fff;background:var(--red)}
.row .lv.other{background:var(--green)}
.row .tblmark{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;color:var(--deep);background:#F3E6D8}
.row .k{font-size:14px;margin-top:4px;color:var(--ink)}
.row .known-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;align-self:center}
.row .detail{display:none;border-top:1px solid var(--line);margin-top:10px;padding-top:10px}
.row.open .detail{display:block}
.row .detail .ex{font-size:15px}
.row .detail .ek{font-size:13px}
.loadmore{width:100%;border:1px dashed var(--line);background:none;color:var(--muted);border-radius:10px;padding:12px;font-size:13.5px;cursor:pointer;font-family:inherit;margin-bottom:8px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}
.toolbtn{background:none;border:none;color:rgba(255,255,255,.75);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}

/* ── 발음 버튼 ── */
.spk{
  border:none;background:#F3E6D8;color:var(--deep);border-radius:50%;
  width:36px;height:36px;font-size:16px;cursor:pointer;flex-shrink:0;
  vertical-align:middle;margin-left:10px;line-height:1;
}
.spk:active{transform:scale(.92)}
.spk.sm{width:27px;height:27px;font-size:12px;margin-left:6px}
.exhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.exhead .exlabel{margin-bottom:0}
@media (prefers-reduced-motion:reduce){.card{transition:none}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Первые шаги <em>Урок 12–20</em></h1>
    <div style="display:flex;gap:12px;align-items:baseline">
      <span class="progress-label" id="progLabel">0 / 0</span>
      <button class="toolbtn" id="resetBtn">초기화</button>
    </div>
  </div>
  <div class="pbar"><div id="pfill"></div></div>
</header>

<nav>
  <button id="tabStudy" class="on">암기</button>
  <button id="tabList">목록</button>
</nav>

<div class="filters" id="filterBar">
  <select class="chip" id="urokSel">
    <option value="ALL">전체 과</option>
    <option value="12">Урок 12</option>
    <option value="13">Урок 13</option>
    <option value="14">Урок 14</option>
    <option value="15">Урок 15</option>
    <option value="16">Урок 16</option>
    <option value="17">Урок 17</option>
    <option value="18">Урок 18</option>
    <option value="19">Урок 19</option>
    <option value="20">Урок 20</option>
  </select>
  <button class="chip pos on" data-pos="ALL">전체</button>
  <button class="chip pos" data-pos="v">동사</button>
  <button class="chip pos" data-pos="n">명사·기타</button>
  <button class="chip" id="unknownChip">모르는 단어만</button>
  <button class="chip" id="shuffleChip">셔플</button>
</div>

<main>
  <div id="studyView">
    <div class="counter" id="counter"></div>
    <div class="cardwrap">
      <div class="card" id="card">
        <div class="face front">
          <div class="tab" id="tabF">동사</div>
          <div class="inner">
            <div class="word serif" id="fWord"></div>
            <div class="pos" id="fPos"></div>
            <div class="notekey serif" id="fGov"></div>
          </div>
          <div class="hint">탭해서 뜻 보기</div>
        </div>
        <div class="face back">
          <div class="tab" id="tabB">동사</div>
          <div class="inner">
            <div class="word serif" id="bWord"></div>
            <div class="gov" id="bGov"></div>
            <div class="ko" id="bKo"></div>
            <div class="exbox">
              <div class="exhead"><div class="exlabel">ПРИМЕР</div><button class="spk sm" id="bExSpk" aria-label="예문 발음 듣기">🔊</button></div>
              <div class="ex" id="bEx"></div>
              <div class="ek" id="bEk"></div>
            </div>
            <div class="vnote" id="bNote"></div>
            <div id="bTbl"></div>
          </div>
        </div>
      </div>
      <div class="done" id="doneBox" style="display:none">
        <div class="big">🎉</div>
        <p id="doneMsg"></p>
        <button id="restartBtn">다시 보기</button>
      </div>
    </div>
    <div class="actions" id="actionBar">
      <button class="btn-prev" id="prevBtn" aria-label="이전 카드">←</button>
      <button class="btn-no" id="noBtn">몰라요</button>
      <button class="btn-yes" id="yesBtn">알아요</button>
    </div>
  </div>

  <div id="listView">
    <div class="searchbar"><input id="searchInput" type="search" placeholder="단어 또는 뜻 검색 (러시아어/한국어)"></div>
    <div id="list"></div>
  </div>
</main>

<script>

 tbl:[{t:"단수",lab:"case",f:["о́тпуск","о́тпуска","о́тпуску","о́тпуск","о́тпуском","о́тпуске"]},{t:"복수",lab:"case",f:["отпуска́","отпуско́в","отпуска́м","отпуска́","отпуска́ми","отпуска́х"]}]},

{w:"сва́дьба",pos:"명.",c:"n",ko:"결혼식",ex:"В суббо́ту у них **сва́дьба**.",ek:"토요일에 그들의 결혼식이 있다.",note:"복수 생격 특이형: сва́деб"},

VOCAB.push(...VOCAB20);





/* ── storage (artifact persistent API + in-memory fallback) ── */
const KEY='pervye-shagi-12-known-v1';
let known=new Set(), memOnly=false, saveTimer=null;
async function loadKnown(){
  try{
    if(window.storage){
      const r=await window.storage.get(KEY);
      if(r&&r.value) known=new Set(JSON.parse(r.value));
    }else memOnly=true;
  }catch(e){/* 키 없음 → 빈 상태 */}
}
function saveKnown(){
  if(memOnly||!window.storage) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await window.storage.set(KEY,JSON.stringify([...known]));}catch(e){}
  },600);
}

/* ── state ── */
let posF='ALL', urokF='ALL', unknownOnly=false, shuffled=false;
let queue=[], qi=0, flipped=false, listShown=100;

function baseFiltered(){
  return VOCAB.map((v,i)=>({v,i})).filter(o=>(posF==='ALL'||o.v.c===posF)&&(urokF==='ALL'||o.v.u===Number(urokF)));
}
function buildQueue(){
  let items=baseFiltered();
  if(unknownOnly) items=items.filter(o=>!known.has(o.i));
  if(shuffled){
    items=[...items];
    for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
  }
  queue=items; qi=0; flipped=false;
  renderCard();
}

/* ── render helpers ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtEx(ex){return esc(ex).replace(/\*\*(.+?)\*\*/g,'<mark>$1</mark>')}

/* ── TTS (Web Speech API) ── */
let ruVoice=null, ttsWarned=false;
function pickVoice(){
  const vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  const ru=vs.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('ru'));
  const pref=['milena','google','yuri','pavel','irina','dmitri'];
  ru.sort((a,b)=>{
    const ai=pref.findIndex(p=>a.name.toLowerCase().includes(p));
    const bi=pref.findIndex(p=>b.name.toLowerCase().includes(p));
    return (ai<0?9:ai)-(bi<0?9:bi);
  });
  ruVoice=ru[0]||null;
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
/* 강세 기호(´)와 ** 마커 제거 — TTS 엔진 오독 방지. ё는 NFC 재조합으로 보존 */
function ttsText(s){
  return String(s).normalize('NFD').replace(/\u0301/g,'').normalize('NFC')
    .replace(/\*\*/g,'').replace(/\s—\s/g,', ');
}
function speak(s){
  if(!window.speechSynthesis){
    if(!ttsWarned){ttsWarned=true;alert('이 브라우저는 음성 재생(Web Speech API)을 지원하지 않아.');}
    return;
  }
  if(!ruVoice) pickVoice();
  const u=new SpeechSynthesisUtterance(ttsText(s));
  u.lang='ru-RU'; u.rate=0.88;
  if(ruVoice){u.voice=ruVoice;}
  else if(!ttsWarned){
    ttsWarned=true;
    alert('이 기기에 러시아어 음성이 없어 기본 음성으로 재생돼.\n(iOS: 설정→손쉬운 사용→콘텐츠 말하기→음성에서 러시아어 추가 / Android: Google TTS 러시아어 설치)');
  }
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function spkBtn(text,sm){
  return `<button class="spk${sm?' sm':''}" data-say="${esc(text).replace(/"/g,'&quot;')}" aria-label="발음 듣기">🔊</button>`;
}
/* capture 단계에서 처리 → 카드 뒤집힘·목록 행 토글보다 먼저 가로챔 */
document.addEventListener('click',e=>{
  const b=e.target.closest('.spk');
  if(!b)return;
  e.stopPropagation();
  e.preventDefault();
  speak(b.dataset.say);
},true);

const LAB={
  pers:['я','ты','он, она́','мы','вы','они́'],
  past:['он','она́','оно́','они́'],
  imp:['ты','вы'],
  case:['И','Р','Д','В','Т','П']
};
function tblHTML(v){
  if(!v.tbl) return '';
  const secs=v.tbl.map(sec=>{
    const labs=LAB[sec.lab]||[];
    const rows=sec.f.map((f,i)=>`<tr><td class="lb">${labs[i]||''}</td><td class="fm">${esc(f)}</td></tr>`).join('');
    return `<div class="tblsec"><div class="tt">${esc(sec.t)}</div><table class="forms">${rows}</table></div>`;
  }).join('');
  return `<details class="tbl"><summary>변화표</summary><div class="tblbody">${secs}</div></details>`;
}
function fullWord(v){ return v.pair ? v.w+' — '+v.pair : v.w; }
function updateProgress(){
  const total=VOCAB.length, k=known.size;
  document.getElementById('progLabel').textContent=`알아요 ${k} / ${total}`;
  document.getElementById('pfill').style.width=(k/total*100)+'%';
}
function renderCard(){
  const card=document.getElementById('card'), done=document.getElementById('doneBox'), act=document.getElementById('actionBar');
  card.classList.remove('flip'); flipped=false;
  if(!queue.length||qi>=queue.length){
    card.style.display='none'; act.style.visibility='hidden'; done.style.display='flex';
    document.getElementById('doneMsg').textContent=queue.length
      ?`${queue.length}개를 모두 봤어! 필터를 바꾸거나 다시 볼 수 있어.`
      :'이 조건에 해당하는 단어가 없어. 필터를 바꿔 봐.';
    document.getElementById('counter').textContent='';
    return;
  }
  card.style.display=''; act.style.visibility=''; done.style.display='none';
  const {v}=queue[qi];
  document.getElementById('counter').innerHTML=`<b>${qi+1}</b> / ${queue.length}`;
  document.getElementById('fWord').innerHTML=esc(v.w)+spkBtn(v.w);
  document.getElementById('fPos').textContent=v.pos;
  document.getElementById('fGov').textContent=v.gov?`(${v.gov})`:'';
  for(const id of['tabF','tabB']){
    const t=document.getElementById(id);
    t.textContent='У'+v.u+' · '+(v.c==='v'?'동사':'명사·기타');
    t.className='tab'+(v.c==='v'?'':' other');
  }
  document.getElementById('bWord').innerHTML=esc(fullWord(v))+`<span class="pos">${esc(v.pos)}</span>`+spkBtn(fullWord(v));
  document.getElementById('bGov').textContent=v.gov?`(${v.gov})`:'';
  document.getElementById('bKo').textContent=v.ko;
  document.getElementById('bEx').innerHTML=fmtEx(v.ex);
  document.getElementById('bExSpk').dataset.say=v.ex;
  document.getElementById('bEk').textContent=v.ek;
  document.getElementById('bNote').innerHTML=v.note?`<b>주의</b> ${esc(v.note)}`:'';
  document.getElementById('bTbl').innerHTML=tblHTML(v);
  const d=document.querySelector('#bTbl details');
  if(d) d.addEventListener('click',e=>e.stopPropagation()); // 표 열 때 카드 안 뒤집히게
}
function mark(isKnown){
  if(qi>=queue.length)return;
  const idx=queue[qi].i;
  if(isKnown)known.add(idx); else known.delete(idx);
  saveKnown(); updateProgress();
  qi++; renderCard();
}

/* ── list view ── */
function renderList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let items=baseFiltered();
  if(unknownOnly) items=items.filter(o=>!known.has(o.i));
  if(q) items=items.filter(o=>fullWord(o.v).toLowerCase().normalize('NFD').replace(/\u0301/g,'').includes(q.normalize('NFD').replace(/\u0301/g,''))||o.v.ko.includes(q));
  const box=document.getElementById('list');
  if(!items.length){box.innerHTML='<div class="empty">결과가 없어.</div>';return;}
  const shown=items.slice(0,listShown);
  box.innerHTML=shown.map(o=>`
    <div class="row" data-i="${o.i}">
      <div class="top">
        <span class="w">${esc(fullWord(o.v))}</span><span class="p">${esc(o.v.pos)}${o.v.gov?' ('+esc(o.v.gov)+')':''}</span>
        ${spkBtn(fullWord(o.v),true)}
        ${known.has(o.i)?'<span class="known-dot" title="알아요"></span>':''}
        ${o.v.tbl?'<span class="tblmark">변화</span>':''}
        <span class="lv ${o.v.c==='v'?'':'other'}">У${o.v.u}</span>
      </div>
      <div class="k">${esc(o.v.ko)}</div>
      <div class="detail">
        <div class="ex serif">${fmtEx(o.v.ex)} ${spkBtn(o.v.ex,true)}</div>
        <div class="ek">${esc(o.v.ek)}</div>
        ${o.v.note?`<div class="vnote"><b>주의</b> ${esc(o.v.note)}</div>`:''}
        ${tblHTML(o.v)}
      </div>
    </div>`).join('')
    +(items.length>listShown?`<button class="loadmore" id="moreBtn">더 보기 (${items.length-listShown}개 남음)</button>`:'');
  box.querySelectorAll('.row').forEach(r=>r.addEventListener('click',e=>{
    if(e.target.closest('details'))return;
    r.classList.toggle('open');
  }));
  const mb=document.getElementById('moreBtn');
  if(mb)mb.addEventListener('click',e=>{e.stopPropagation();listShown+=100;renderList();});
}

/* ── events ── */
document.getElementById('card').addEventListener('click',()=>{
  flipped=!flipped;
  document.getElementById('card').classList.toggle('flip',flipped);
});
document.getElementById('yesBtn').addEventListener('click',()=>mark(true));
document.getElementById('noBtn').addEventListener('click',()=>mark(false));
document.getElementById('prevBtn').addEventListener('click',()=>{if(qi>0){qi--;renderCard();}});
document.getElementById('restartBtn').addEventListener('click',()=>buildQueue());

document.querySelectorAll('.chip.pos').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.chip.pos').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); posF=b.dataset.pos;
  listShown=100; buildQueue(); renderList();
}));
document.getElementById('urokSel').addEventListener('change',e=>{
  urokF=e.target.value;
  listShown=100; buildQueue(); renderList();
});
document.getElementById('unknownChip').addEventListener('click',e=>{
  unknownOnly=!unknownOnly;
  e.target.classList.toggle('on',unknownOnly);
  buildQueue(); renderList();
});
document.getElementById('shuffleChip').addEventListener('click',e=>{
  shuffled=!shuffled;
  e.target.classList.toggle('on',shuffled);
  buildQueue();
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('학습 기록을 모두 초기화할까?'))return;
  known.clear(); saveKnown(); updateProgress(); buildQueue(); renderList();
});
document.getElementById('tabStudy').addEventListener('click',()=>switchMode('study'));
document.getElementById('tabList').addEventListener('click',()=>switchMode('list'));
function switchMode(m){
  document.getElementById('tabStudy').classList.toggle('on',m==='study');
  document.getElementById('tabList').classList.toggle('on',m==='list');
  document.getElementById('studyView').style.display=m==='study'?'flex':'none';
  document.getElementById('listView').style.display=m==='list'?'flex':'none';
  if(m==='list') renderList();
}
document.getElementById('searchInput').addEventListener('input',()=>renderList());

/* ── init ── */
(async()=>{
  await loadKnown();
  updateProgress();
  buildQueue();
})();

</script>
</body>
</html>
